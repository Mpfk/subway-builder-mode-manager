name: "Copilot Setup Steps"

# Runs automatically when this file changes on the default branch (for validation).
# Also runnable manually from the Actions tab.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # IMPORTANT: This job MUST be named exactly `copilot-setup-steps`.
  # Any other name is silently ignored by GitHub Copilot cloud agent.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      # These permissions apply ONLY to the setup workflow steps below.
      # Copilot cloud agent receives its own separately-scoped token for runtime operations.
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Add your project's language tooling below ─────────────────────────
      # No authentication setup is needed — the Copilot cloud agent provides
      # its own token with issue/contents/PR access for the repository.
      #
      # Example — Node.js project:
      # - name: Set up Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      #     cache: "npm"
      #
      # - name: Install dependencies
      #   run: npm ci
      #
      # Example — Python project:
      # - name: Set up Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.12"
      #
      # - name: Install dependencies
      #   run: pip install -r requirements.txt