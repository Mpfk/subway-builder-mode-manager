name: Conventional Commits Check
on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          PATTERN='^(feat|fix|test|refactor|docs|chore)(\(.+\))?: .+'
          FAILED=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "❌ Invalid: $msg"
              FAILED=1
            fi
          done < <(git log origin/main..HEAD --no-merges --pretty=format:'%s')
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must follow Conventional Commits: type(scope): description"
            echo "Valid types: feat, fix, test, refactor, docs, chore"
            exit 1
          fi
          echo "✅ All commit messages follow Conventional Commits format"
