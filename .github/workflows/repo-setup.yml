name: Repo Setup

# Runs automatically on every push to main so that a fresh template clone
# gets labels applied without any manual steps.
# Safe to run repeatedly — all operations are idempotent.
# Note: branch protection must be configured manually (GITHUB_TOKEN lacks the required scope).

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install YAML parser
        run: npm install js-yaml

      - name: Sync labels from .github/labels.yml
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const config = yaml.load(fs.readFileSync('.github/labels.yml', 'utf8'));
            const labels = config.labels || [];

            // Build a case-insensitive map of labels that already exist.
            // This prevents "already_exists" validation errors when getLabel()
            // throws for any reason other than 404 (e.g. casing mismatches).
            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, { owner, repo, per_page: 100 });
            const existingByLower = new Map(existing.map(l => [l.name.toLowerCase(), l.name]));

            for (const label of labels) {
              const name = label.name;
              const color = (label.color || 'ededed').replace('#', '');
              const description = label.description || '';

              const actualName = existingByLower.get(name.toLowerCase());
              if (actualName) {
                // Update using the actual stored name (normalises casing if needed).
                await github.rest.issues.updateLabel({ owner, repo, name: actualName, new_name: name, color, description });
              } else {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              }
            }

            core.info(`Synced ${labels.length} labels.`);
