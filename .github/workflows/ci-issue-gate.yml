name: CI Issue Gate

on:
  workflow_run:
    workflows: ["Test Suite", "Conventional Commits Check", "Workflow Policy"]
    types: [completed]

permissions:
  checks: read
  issues: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync-from-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Sync issue status from CI outcomes
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run = context.payload.workflow_run;

            if (!run || run.event !== 'pull_request') return;
            if (!Array.isArray(run.pull_requests) || run.pull_requests.length === 0) return;

            const pr_number = run.pull_requests[0].number;
            const pr = (await github.rest.pulls.get({ owner, repo, pull_number: pr_number })).data;

            const branch = pr.head.ref;
            let issue_number;
            const branchMatch = /^issue\/(\d+)$/.exec(branch);
            if (branchMatch) {
              issue_number = Number(branchMatch[1]);
            } else {
              const prText = `${pr.title}\n\n${pr.body || ''}`;
              const bodyMatch = /closes\s+#(\d+)/i.exec(prText);
              if (!bodyMatch) return;
              issue_number = Number(bodyMatch[1]);
            }

            const issue = (await github.rest.issues.get({ owner, repo, issue_number })).data;
            const statuses = (issue.labels || []).map((l) => l.name).filter((n) => n.startsWith('status/'));
            const active = statuses[statuses.length - 1] || null;

            const setStatus = async (next) => {
              const latestIssue = (await github.rest.issues.get({ owner, repo, issue_number })).data;
              const latest = (latestIssue.labels || []).map((l) => l.name).filter((n) => n.startsWith('status/'));
              for (const status of latest) {
                if (status !== next) {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number, name: status }).catch(() => {});
                }
              }
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [next] });
            };

            const checks = await github.rest.checks.listForRef({ owner, repo, ref: pr.head.sha, per_page: 100 });
            const ownRunToken = `/runs/${run.id}/`;
            const runs = (checks.data.check_runs || []).filter((r) => {
              const details = r.details_url || r.html_url || '';
              return !details.includes(ownRunToken);
            });
            if (runs.length === 0) return;

            const blocking = runs.filter((r) => r.status !== 'completed');
            if (blocking.length > 0) return;

            const successConclusions = new Set(['success', 'neutral', 'skipped']);
            const failing = runs.filter((r) => !successConclusions.has(r.conclusion || ''));

            if (failing.length > 0) {
              if (active !== 'status/in-progress') {
                await setStatus('status/in-progress');
              }

              const failedNames = failing.map((r) => `- ${r.name} (${r.conclusion || 'unknown'})`).join('\n');
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: [
                  'Gate check failed: CI checks are not green. Status set to status/in-progress.',
                  '',
                  'Failed checks:',
                  failedNames,
                  '',
                  `PR: #${pr.number}`,
                  `Head SHA: ${pr.head.sha}`,
                  '',
                  'Next:',
                  "- Re-invoke Copilot 'develop' Agent with the failure output and prior retrospective context.",
                  '- Keep PR in draft until CI is green and review prerequisites are satisfied.',
                ].join('\n'),
              });
              return;
            }

            if (pr.draft && active === 'status/in-progress') {
              await setStatus('status/review');
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: [
                  'Review kickoff: CI checks are green on the draft PR. Status moved to status/review.',
                  '',
                  'Next:',
                  "- Invoke Copilot 'review' Agent and confirm PASS.",
                  '- Keep PR as draft until Gate 2 prerequisites are satisfied.',
                  '- After PASS, convert PR to ready-for-review and proceed to Gate 2 merge approval.',
                ].join('\n'),
              });
            }
