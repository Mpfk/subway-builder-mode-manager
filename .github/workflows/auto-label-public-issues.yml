name: Auto-label public issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply type label from user-report form answer
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const heading = '### What kind of report is this?';
            if (!body.includes(heading)) return;

            const after = body.split(heading)[1] || '';
            const answer = after.split(/\n###\s/)[0].trim();

            const map = [
              { match: /^Bug\b/i, label: 'bug' },
              { match: /^Feature request\b/i, label: 'feature' },
              { match: /^Question\b/i, label: 'question' },
              { match: /^Compatibility\b/i, label: 'compatibility' },
            ];
            const hit = map.find((m) => m.match.test(answer));
            if (!hit) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [hit.label],
            });
