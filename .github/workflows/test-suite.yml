name: Test Suite
on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run test suite
        run: |
          source .githooks/lib/detect.sh
          detect_test_cmd
          if [ -z "$TEST_CMD" ]; then
            echo "⚠️  No test command configured or detected. Skipping test suite."
            exit 0
          fi
          eval "$TEST_CMD"
