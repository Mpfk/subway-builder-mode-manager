name: Issue Native Automation

on:
  issues:
    types: [labeled, assigned]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  branch-and-kickoff:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Create issue branch when moved to ready
        if: github.event.action == 'labeled' && github.event.label.name == 'status/ready'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const branch = `issue/${issue.number}`;

            const defaultBranch = (await github.rest.repos.get({ owner, repo })).data.default_branch;
            const ref = (await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` })).data;

            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            } catch {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${branch}`,
                sha: ref.object.sha,
              });
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: `Issue is ready. Branch ready: ${branch}. Assign to Copilot 'develop' Agent to begin work.`
            });

      - name: Move to in-progress when Copilot is assigned on ready issue
        if: github.event.action == 'assigned'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;

            // Only act when Copilot itself was just assigned (not a co-assignee like the repo owner).
            // Using context.payload.assignee (the specific person added in this event) prevents
            // double-firing when the user assigns themselves and Copilot simultaneously.
            const justAssigned = (context.payload.assignee?.login || '').toLowerCase();
            if (!justAssigned.includes('copilot')) return;

            // Idempotency guard: if implementation is already running, do nothing.
            const labels = (issue.labels || []).map((l) => l.name);
            if (labels.includes('status/in-progress')) return;
            if (!labels.includes('status/ready')) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: 'Copilot assignment detected, but issue is not status/ready. Next step: complete Gate 1 plan approval first, then assign to Copilot \'develop\' Agent.',
              });
              return;
            }

            // Re-fetch current labels, then remove all status/* labels before adding status/in-progress.
            const current = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: issue.number });
            const statusLabels = current.data.filter(l => l.name.startsWith('status/')).map(l => l.name);
            for (const l of statusLabels) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name: l }).catch(() => {});
            }
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue.number,
              labels: ['status/in-progress'],
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: [
                'Implementation kickoff:',
                '',
                `> **IMPORTANT — branch:** The branch \`issue/${issue.number}\` has already been created.`,
                '> Checkout **this existing branch** before making any commits.',
                '> Do NOT create a new branch (e.g. `copilot/...`). Use `issue/' + issue.number + '` only.',
                '> Copilot `develop` agent is now the implementation worker for this issue.',
                '',
                '- Run TDD agent per independently testable task',
                '- Keep docs updated in docs/',
                '- Open PR from `issue/' + issue.number + '` to `main` when tasks are complete',
              ].join('\n'),
            });

  comment-commands:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Handle lightweight workflow commands
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            if (!issue || issue.pull_request) return;

            const body = (context.payload.comment?.body || '').trim().toLowerCase();
            const actor = context.payload.comment?.user?.login || 'unknown';
            const association = context.payload.comment?.author_association || 'NONE';
            const allowedAssociations = new Set(['OWNER', 'MEMBER']);

            if (body === '/auto plan-approved') {
              if (!allowedAssociations.has(association)) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: `Plan approval command ignored: @${actor} is not a maintainer (${association}).`,
                });
                return;
              }

              const statusNames = (issue.labels || []).map((l) => l.name).filter((n) => n.startsWith('status/'));
              if (!(statusNames.includes('status/planning') || statusNames.includes('status/researching'))) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: `Plan approval command ignored: current status must be status/planning or status/researching. Current: ${statusNames.join(', ') || 'none'}.`,
                });
                return;
              }

              const issueBody = issue.body || '';
              const hasResearch = /### Key Findings\s+[^#\s]/.test(issueBody);
              const hasPlan = issueBody.includes('## Plan') && /## Plan\s+[^#\s]/.test(issueBody);
              const hasCriteria = issueBody.includes('## Acceptance Criteria') && /## Acceptance Criteria\s+[^#\s]/.test(issueBody);
              if (!(hasResearch && hasPlan && hasCriteria)) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: 'Plan approval command ignored: issue body must include completed Research, Plan, and Acceptance Criteria sections.',
                });
                return;
              }

              const current = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: issue.number });
              const statusLabels = current.data.filter(l => l.name.startsWith('status/')).map(l => l.name);
              for (const l of statusLabels) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name: l }).catch(() => {});
              }
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: ['status/ready'],
              });
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Gate 1 approved by @${actor}. Status moved to status/ready. Next step: assign to Copilot 'develop' Agent to begin work.`,
              });
            }
