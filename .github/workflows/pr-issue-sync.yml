name: PR Issue Sync

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  issues: write
  pull-requests: read
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync issue status from PR lifecycle
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const action = context.payload.action;

            const branch = pr.head.ref;

            // Prefer issue/{N} branch name; fall back to "Closes #N" in title/body.
            // This handles the Copilot SWE agent which always creates copilot/... branches.
            let issue_number;
            const branchMatch = /^issue\/(\d+)$/.exec(branch);
            if (branchMatch) {
              issue_number = Number(branchMatch[1]);
            } else {
              const prText = `${pr.title}\n\n${pr.body || ''}`;
              const bodyMatch = /closes\s+#(\d+)/i.exec(prText);
              if (!bodyMatch) return;
              issue_number = Number(bodyMatch[1]);
            }

            const setStatus = async (next) => {
              const issue = (await github.rest.issues.get({ owner, repo, issue_number })).data;
              const statuses = (issue.labels || []).map((l) => l.name).filter((n) => n.startsWith('status/'));
              for (const status of statuses) {
                if (status !== next) {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number, name: status }).catch(() => {});
                }
              }
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [next] });
            };

            if (["opened", "reopened", "synchronize"].includes(action)) {
              await setStatus('status/in-progress');
              return;
            }

            if (action === 'closed' && pr.merged) {
              await setStatus('status/done');
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: 'Gate 2 complete: PR merged. Status moved to status/done. Next step: no action required unless follow-up work is needed.',
              });
              await github.rest.issues.update({ owner, repo, issue_number, state: 'closed' });
              await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` }).catch(() => {});
            }
